name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: pnpm lint

      - name: Typecheck release scripts
        run: pnpm typecheck:scripts

      - name: Check GitHub Actions are SHA-pinned
        run: |
          UNPINNED=$(grep -rn 'uses:.*@v[0-9]' .github/workflows/ .github/actions/ || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Found unpinned action references (must use SHA pins with version comment):"
            echo "$UNPINNED"
            exit 1
          fi

  all-checks-passed:
    name: All checks passed
    needs: [lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if lint did not succeed
        if: needs.lint.result != 'success'
        run: exit 1
