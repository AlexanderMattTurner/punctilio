name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: pnpm lint

      - name: Check GitHub Actions are SHA-pinned
        run: |
          UNPINNED=$(grep -rn 'uses:.*@v[0-9]' .github/workflows/ .github/actions/ || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Found unpinned action references (must use SHA pins with version comment):"
            echo "$UNPINNED"
            exit 1
          fi
