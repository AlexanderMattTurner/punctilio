name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: pnpm lint

      - name: Typecheck release scripts
        run: pnpm typecheck:scripts

      - name: Check GitHub Actions are SHA-pinned
        run: |
          UNPINNED=$(grep -rn 'uses:.*@v[0-9]' .github/workflows/ .github/actions/ || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Found unpinned action references (must use SHA pins with version comment):"
            echo "$UNPINNED"
            exit 1
          fi

  all-checks-passed:
    name: All checks passed
    needs: [lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if lint did not succeed
        if: needs.lint.result != 'success'
        run: exit 1
