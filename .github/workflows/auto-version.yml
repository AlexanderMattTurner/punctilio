name: Auto Version Bump and Publish

on:
  push:
    branches: [main]

concurrency:
  group: version-and-publish
  cancel-in-progress: false

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      - name: Auto Version Bump and Publish
        run: bash scripts/version-bump.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  all-checks-passed:
    name: All checks passed
    needs: [version-and-publish]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if version-and-publish did not succeed
        if: needs.version-and-publish.result != 'success'
        run: exit 1
