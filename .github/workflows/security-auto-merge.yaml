name: Security PR Auto-Merge

# Automatically enables auto-merge for PRs created by the weekly security
# vulnerability scan (labeled `security-scan`). GitHub will merge them once
# required CI checks pass and review requirements are satisfied.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: contains(github.event.pull_request.labels.*.name, 'security-scan') && !github.event.pull_request.draft
    steps:
      - name: Enable auto-merge for security-scan PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
