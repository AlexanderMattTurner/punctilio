version: 2
updates:
  # Disable version-update churn by capping open PRs at 0.
  # Security updates ignore this limit and are still raised.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
