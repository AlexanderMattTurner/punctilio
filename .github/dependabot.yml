version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # jest 30 instruments branches more granularly via babel-plugin-istanbul,
      # dropping coverage below the 100% threshold even with all tests passing.
      # Revisit when a stable workaround exists.
      - dependency-name: "jest"
        versions: [">=30"]
      - dependency-name: "@types/jest"
        versions: [">=30"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
